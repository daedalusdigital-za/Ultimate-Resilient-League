<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Player Cards - Ultimate Resilient League</title>
    <link rel="stylesheet" href="assets/css/premium-cards.css">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }

        /* ===== PAGE LAYOUT ===== */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .page-header p {
            color: #888;
            font-size: 1rem;
        }

        /* ===== FILTER CONTROLS ===== */
        .filter-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-controls label {
            font-size: 0.9rem;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-controls select {
            padding: 10px 20px;
            font-size: 1rem;
            border: 2px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-controls select:hover,
        .filter-controls select:focus {
            border-color: #FFD700;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        /* ===== CARDS GRID ===== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            justify-items: center;
        }

        /* ===== RESPONSIVE (page-level only) ===== */
        @media (max-width: 600px) {
            .page-header h1 {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }
            .cards-grid {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="page-header">
        <h1>URL Player Cards</h1>
        <p>Ultimate Resilient League</p>
    </header>
    
    <div class="filter-controls">
        <label>
            Filter by Rarity:
            <select id="rarityFilter" aria-label="Filter cards by rarity">
                <option value="all">All Cards</option>
                <option value="common">Common</option>
                <option value="rare">Rare</option>
                <option value="elite">Elite</option>
                <option value="legend">Legend</option>
            </select>
        </label>
    </div>
    
    <main class="cards-grid" id="cardsContainer" role="list">
        <!-- Cards will be rendered here by JavaScript -->
    </main>

    <script>
        // ===== PLAYER DATA =====
        const playersData = [
            {
                ign: "SKARA",
                team: "URL WOLVES",
                role: "FRAGGER",
                rarity: "elite",
                urlRating: 92,
                kills: 412,
                appearances: 36,
                kd: 3.1,
                avgKills: 11.4,
                wins: 18,
                urlScore: 1280,


                imageUrl: ""
            },
            {
                ign: "PHANTOM",
                team: "SHADOW KNIGHTS",
                role: "IGL",
                rarity: "legend",
                urlRating: 96,
                kills: 385,
                appearances: 42,
                kd: 2.8,
                avgKills: 9.2,
                wins: 28,
                urlScore: 1450,


                imageUrl: ""
            },
            {
                ign: "VENOM",
                team: "CYBER DRAGONS",
                role: "SUPPORT",
                rarity: "rare",
                urlRating: 85,
                kills: 298,
                appearances: 38,
                kd: 2.1,
                avgKills: 7.8,
                wins: 15,
                urlScore: 980,


                imageUrl: ""
            },
            {
                ign: "BLITZ",
                team: "THUNDER SQUAD",
                role: "TANK",
                rarity: "common",
                urlRating: 72,
                kills: 186,
                appearances: 28,
                kd: 1.6,
                avgKills: 6.6,
                wins: 8,
                urlScore: 620,


                imageUrl: ""
            },
            {
                ign: "NOVA",
                team: "PHOENIX RISING",
                role: "FRAGGER",
                rarity: "elite",
                urlRating: 89,
                kills: 356,
                appearances: 34,
                kd: 2.9,
                avgKills: 10.5,
                wins: 19,
                urlScore: 1180,


                imageUrl: ""
            },
            {
                ign: "FROST",
                team: "ARCTIC STORM",
                role: "SUPPORT",
                rarity: "rare",
                urlRating: 83,
                kills: 274,
                appearances: 32,
                kd: 2.3,
                avgKills: 8.6,
                wins: 14,
                urlScore: 920,


                imageUrl: ""
            }
        ];

        // ===== CARD RENDERER =====
        function createPlayerCard(player) {
            const card = document.createElement('article');
            card.className = `url-card ${player.rarity}`;
            card.setAttribute('role', 'listitem');
            card.setAttribute('aria-label', `${player.ign} - ${player.rarity} ${player.role} from ${player.team}, Rating: ${player.urlRating}`);
            card.setAttribute('tabindex', '0');
            card.dataset.rarity = player.rarity;
            card.dataset.role = player.role;
            
            // Build portrait content
            const DEFAULT_PORTRAIT = 'https://preview.redd.it/1jc1uhvavtt41.png?width=1080&crop=smart&auto=webp&s=cdd44f66cd046eef938476d3e035c88bb5750b7b';
            const portraitUrl = player.imageUrl || DEFAULT_PORTRAIT;
            const portraitContent = `<div class="url-portrait-image" style="background-image: url('${portraitUrl}')" role="img" aria-label="${player.ign} portrait"></div>`;
            
            // Legend sparkles
            const sparkles = player.rarity === 'legend' 
                ? `<div class="url-legend-sparkles" aria-hidden="true">
                    <span class="url-sparkle"></span>
                    <span class="url-sparkle"></span>
                    <span class="url-sparkle"></span>
                    <span class="url-sparkle"></span>
                    <span class="url-sparkle"></span>
                   </div>`
                : '';
            
            // Foil overlay for rare+
            const foilOverlay = ['rare', 'elite', 'legend'].includes(player.rarity)
                ? '<div class="url-foil-overlay" aria-hidden="true"></div>'
                : '';
            
            card.innerHTML = `
                <div class="url-card-inner">
                    <!-- Header Strip -->
                    <div class="url-card-header">
                        <div class="url-rating-section">
                            <span class="url-rating-label">URL</span>
                            <span class="url-rating-value">${player.urlRating}</span>
                            <span class="url-team-name">${player.team}</span>
                        </div>
                        <span class="url-role-badge" aria-label="Role: ${player.role}">${player.role}</span>
                    </div>
                    
                    <!-- Portrait Zone -->
                    <div class="url-portrait-zone">
                        ${portraitContent}
                        <div class="url-portrait-shine" aria-hidden="true"></div>
                        <div class="url-portrait-vignette" aria-hidden="true"></div>
                        <div class="url-flag-badge" aria-hidden="true"></div>
                    </div>
                    
                    <!-- Identity Row -->
                    <div class="url-identity-row">
                        <span class="url-player-ign">${player.ign}</span>
                        <span class="url-season-text">Ultimate Resilient League</span>
                    </div>
                    
                    <!-- Stats Grid -->
                    <div class="url-stats-grid">
                        <div class="url-stat-item">
                            <span class="url-stat-value">${player.kills}</span>
                            <span class="url-stat-label">Kills</span>
                        </div>
                        <div class="url-stat-item">
                            <span class="url-stat-value">${player.appearances}</span>
                            <span class="url-stat-label">Apps</span>
                        </div>
                        <div class="url-stat-item">
                            <span class="url-stat-value">${player.kd.toFixed(1)}</span>
                            <span class="url-stat-label">K/D</span>
                        </div>
                        <div class="url-stat-item">
                            <span class="url-stat-value">${player.wins}</span>
                            <span class="url-stat-label">Wins</span>
                        </div>
                        <div class="url-stat-item">
                            <span class="url-stat-value">${player.avgKills.toFixed(1)}</span>
                            <span class="url-stat-label">Avg K</span>
                        </div>
                        <div class="url-stat-item url-value-stat">
                            <span class="url-stat-value">${player.urlScore}</span>
                            <span class="url-stat-label">Score</span>
                        </div>
                    </div>
                    
                    <!-- Meta Badges -->
                    <div class="url-meta-badges">
                        <span class="url-rarity-badge">${player.rarity}</span>
                    </div>
                    
                    ${sparkles}
                    ${foilOverlay}
                </div>
            `;
            
            return card;
        }

        // ===== RENDER ALL CARDS =====
        function renderCards(players) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            players.forEach(player => {
                const card = createPlayerCard(player);
                container.appendChild(card);
            });
        }

        // ===== FILTER FUNCTIONALITY =====
        function filterCards(rarity) {
            const cards = document.querySelectorAll('.url-card');
            
            cards.forEach(card => {
                if (rarity === 'all' || card.dataset.rarity === rarity) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', () => {
            // Render all cards
            renderCards(playersData);
            
            // Setup filter
            const filterSelect = document.getElementById('rarityFilter');
            filterSelect.addEventListener('change', (e) => {
                filterCards(e.target.value);
            });
        });
    </script>
</body>
</html>
