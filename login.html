        <style>
            /* ===== AUTH PAGE STYLES ===== */
            .url-auth-section {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 120px 20px 60px;
                position: relative;
                overflow: hidden;
            }

            .url-auth-section::before {
                content: '';
                position: absolute;
                inset: 0;
                background: radial-gradient(ellipse at 30% 20%, rgba(255, 8, 8, 0.08) 0%, transparent 50%),
                            radial-gradient(ellipse at 70% 80%, rgba(255, 215, 0, 0.06) 0%, transparent 50%);
                pointer-events: none;
            }

            .url-auth-container {
                width: 100%;
                max-width: 480px;
                position: relative;
                z-index: 1;
            }

            .url-auth-card {
                background: rgba(28, 29, 32, 0.95);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 20px;
                padding: 50px 40px;
                backdrop-filter: blur(20px);
                box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
                position: relative;
                overflow: hidden;
            }

            .url-auth-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                background: linear-gradient(90deg, #FF0808, #FFD700, #FF0808);
            }

            .url-auth-logo {
                text-align: center;
                margin-bottom: 35px;
            }

            .url-auth-logo img {
                max-height: 80px;
                width: auto;
            }

            .url-auth-title {
                text-align: center;
                margin-bottom: 8px;
                font-size: 1.8rem;
                font-weight: 700;
                color: #fff;
                font-family: 'Chakra Petch', sans-serif;
                text-transform: uppercase;
                letter-spacing: 2px;
            }

            .url-auth-subtitle {
                text-align: center;
                color: rgba(255, 255, 255, 0.5);
                font-size: 0.95rem;
                margin-bottom: 35px;
            }

            .url-form-group {
                margin-bottom: 22px;
                position: relative;
            }

            .url-form-label {
                display: block;
                color: rgba(255, 255, 255, 0.7);
                font-size: 0.85rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 8px;
                font-family: 'Chakra Petch', sans-serif;
            }

            .url-form-input {
                width: 100%;
                padding: 14px 18px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                color: #fff;
                font-size: 1rem;
                font-family: 'Chakra Petch', sans-serif;
                transition: all 0.3s ease;
                outline: none;
            }

            .url-form-input::placeholder {
                color: rgba(255, 255, 255, 0.3);
            }

            .url-form-input:focus {
                border-color: rgba(255, 8, 8, 0.5);
                background: rgba(255, 255, 255, 0.08);
                box-shadow: 0 0 20px rgba(255, 8, 8, 0.1);
            }

            .url-form-input.error {
                border-color: #ff4444;
            }

            .url-input-icon {
                position: absolute;
                right: 16px;
                top: 42px;
                color: rgba(255, 255, 255, 0.3);
                font-size: 0.9rem;
                pointer-events: none;
            }

            .url-password-toggle {
                position: absolute;
                right: 16px;
                top: 42px;
                color: rgba(255, 255, 255, 0.4);
                cursor: pointer;
                background: none;
                border: none;
                font-size: 0.95rem;
                padding: 4px;
                transition: color 0.3s ease;
            }

            .url-password-toggle:hover {
                color: rgba(255, 255, 255, 0.8);
            }

            .url-form-extras {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 25px;
            }

            .url-remember-me {
                display: flex;
                align-items: center;
                gap: 8px;
                color: rgba(255, 255, 255, 0.6);
                font-size: 0.85rem;
                cursor: pointer;
            }

            .url-remember-me input[type="checkbox"] {
                width: 16px;
                height: 16px;
                accent-color: #FF0808;
                cursor: pointer;
            }

            .url-forgot-link {
                color: #FF0808;
                font-size: 0.85rem;
                text-decoration: none;
                transition: color 0.3s ease;
            }

            .url-forgot-link:hover {
                color: #FFD700;
            }

            .url-auth-submit {
                width: 100%;
                padding: 16px;
                border: none;
                border-radius: 12px;
                font-size: 1.05rem;
                font-weight: 700;
                font-family: 'Chakra Petch', sans-serif;
                text-transform: uppercase;
                letter-spacing: 2px;
                cursor: pointer;
                transition: all 0.4s ease;
                position: relative;
                overflow: hidden;
                color: #fff;
                background: linear-gradient(135deg, #FF0808, #a50000);
            }

            .url-auth-submit:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(255, 8, 8, 0.4);
            }

            .url-auth-submit:active {
                transform: translateY(0);
            }

            .url-auth-submit.loading {
                pointer-events: none;
                opacity: 0.8;
            }

            .url-auth-submit.loading::after {
                content: '';
                position: absolute;
                width: 20px;
                height: 20px;
                border: 2px solid transparent;
                border-top-color: #fff;
                border-radius: 50%;
                animation: authSpin 0.6s linear infinite;
                margin-left: 10px;
                display: inline-block;
                vertical-align: middle;
            }

            @keyframes authSpin {
                to { transform: rotate(360deg); }
            }

            .url-auth-divider {
                display: flex;
                align-items: center;
                margin: 28px 0;
                gap: 15px;
            }

            .url-auth-divider::before,
            .url-auth-divider::after {
                content: '';
                flex: 1;
                height: 1px;
                background: rgba(255, 255, 255, 0.1);
            }

            .url-auth-divider span {
                color: rgba(255, 255, 255, 0.4);
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .url-auth-switch {
                text-align: center;
                color: rgba(255, 255, 255, 0.6);
                font-size: 0.95rem;
            }

            .url-auth-switch a {
                color: #FFD700;
                font-weight: 700;
                text-decoration: none;
                transition: color 0.3s ease;
            }

            .url-auth-switch a:hover {
                color: #FF0808;
            }

            .url-auth-message {
                padding: 12px 16px;
                border-radius: 10px;
                margin-bottom: 20px;
                font-size: 0.9rem;
                display: none;
                align-items: center;
                gap: 10px;
            }

            .url-auth-message.error {
                display: flex;
                background: rgba(255, 68, 68, 0.15);
                border: 1px solid rgba(255, 68, 68, 0.3);
                color: #ff6b6b;
            }

            .url-auth-message.success {
                display: flex;
                background: rgba(39, 174, 96, 0.15);
                border: 1px solid rgba(39, 174, 96, 0.3);
                color: #2ecc71;
            }

            .url-auth-message i {
                font-size: 1.1rem;
                flex-shrink: 0;
            }

            /* Floating particles */
            .url-auth-particles {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
                overflow: hidden;
            }

            .url-auth-particle {
                position: absolute;
                width: 4px;
                height: 4px;
                background: rgba(255, 8, 8, 0.3);
                border-radius: 50%;
                animation: authFloat linear infinite;
            }

            .url-auth-particle:nth-child(2) { width: 6px; height: 6px; background: rgba(255, 215, 0, 0.2); animation-duration: 18s; left: 20%; }
            .url-auth-particle:nth-child(3) { width: 3px; height: 3px; background: rgba(255, 8, 8, 0.2); animation-duration: 22s; left: 40%; animation-delay: -5s; }
            .url-auth-particle:nth-child(4) { width: 5px; height: 5px; background: rgba(255, 215, 0, 0.15); animation-duration: 20s; left: 60%; animation-delay: -8s; }
            .url-auth-particle:nth-child(5) { width: 4px; height: 4px; background: rgba(255, 8, 8, 0.25); animation-duration: 25s; left: 80%; animation-delay: -3s; }
            .url-auth-particle:nth-child(6) { width: 7px; height: 7px; background: rgba(255, 215, 0, 0.1); animation-duration: 28s; left: 90%; animation-delay: -12s; }

            @keyframes authFloat {
                0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 1; }
                100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
            }

            /* Rules Button */
            .url-rules-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                width: 100%;
                padding: 14px 20px;
                margin-bottom: 25px;
                background: linear-gradient(135deg, #9B59B6, #8E44AD);
                border: 1px solid rgba(155, 89, 182, 0.5);
                border-radius: 12px;
                color: #fff;
                font-size: 1rem;
                font-weight: 700;
                font-family: 'Chakra Petch', sans-serif;
                text-transform: uppercase;
                letter-spacing: 2px;
                text-decoration: none;
                cursor: pointer;
                transition: all 0.4s ease;
                box-shadow: 0 4px 15px rgba(155, 89, 182, 0.3);
            }

            .url-rules-btn:hover {
                background: linear-gradient(135deg, #8E44AD, #7D3C98);
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(155, 89, 182, 0.5);
                color: #fff;
            }

            .url-rules-btn:active {
                transform: translateY(0);
            }

            .url-rules-btn i {
                font-size: 1.1rem;
            }

            /* Mobile */
            @media (max-width: 576px) {
                .url-auth-card { padding: 35px 25px; }
                .url-auth-title { font-size: 1.4rem; }
                .url-rules-btn {
                    padding: 12px 16px;
                    font-size: 0.9rem;
                }
            }
        </style>
    </head>

        <script>
            // Toggle password visibility
            function togglePassword(inputId, btn) {
                const input = document.getElementById(inputId);
                const icon = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            }

            // Redirect if already logged in
            if (URLAuth.isLoggedIn()) {
                window.location.href = 'index.html';
            }

            // Handle login form
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();

                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const btn = document.getElementById('loginBtn');
                const msgEl = document.getElementById('authMessage');
                const msgText = document.getElementById('authMessageText');

                // Loading state
                btn.classList.add('loading');
                btn.innerHTML = '<i class="fa-solid fa-spinner"></i> Signing in...';

                // Simulate brief delay for UX
                setTimeout(() => {
                    const result = URLAuth.login(email, password);

                    if (result.success) {
                        msgEl.className = 'url-auth-message success';
                        msgEl.querySelector('i').className = 'fa-solid fa-circle-check';
                        msgText.textContent = result.message;

                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                    } else {
                        msgEl.className = 'url-auth-message error';
                        msgEl.querySelector('i').className = 'fa-solid fa-circle-exclamation';
                        msgText.textContent = result.message;

                        btn.classList.remove('loading');
                        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
                    }
                }, 600);
            });
        </script>
